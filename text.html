<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .menu{
            background-color: red;
            width: 100%;
            display: flex;
        }
        .item{
            background-color: blue;
            position: fixed;
            top: 32px;
            width: 25%;
        }
        .list {
            background-color: yellow;
            position: fixed;
            top:32px;
            left:25%;
            width:25% ;
        }

        .product{
            background-color: green;
            position: fixed;
            top:32px;
            left:50%;
            width:25% ;
        }
        .img {
            background-color: blue;
            position: fixed;
            top:32px;
            left:75%;
            width:25% ;

        }
        @media screen  and (max-width : 750px){
            .menu{
            background-color: red;
            width: 100%;
            display: block;
        }
        .item{
            background-color: blue;
            position: static;
            width: 100%;
            
        }
      
        .container{
            background-color: green;
            position: fixed;
            height: 20px;
            z-index: 2;
            top:60px;
            left: 0;
            width:100% ;
        }
        .product{
            position: static;    
        }
        .list {
            
            background-color: yellow;
            position: static;
            top:32px;
            left:25%;
            width:25% ;
        }
        .img {
        
            background-color: blue;
            position: static;
            top:32px;
            left:75%;
            width:25% ;

        }  
        }
      
    </style>
</head>

<body>
    <div class = "menu">
        <div>menu</div>
        <div class = 'item'>
            <div>item</div>
                <div class = "container">
                    <div class = "list">list</div>
                    <div class ="product">product</div>
                    <div class = "img">img</div>
                </div>
            </div>
        </div>
        
    </div>

</body>
</html>
